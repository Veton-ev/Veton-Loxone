<svg xmlns="http://www.w3.org/2000/svg" width="720" height="540" viewBox="0 0 720 540" font-family="'Segoe UI', Roboto, system-ui, sans-serif">
  <!-- Loxone app light theme -->
  <rect width="720" height="540" fill="#e9eaec"/>

  <!-- Card -->
  <g transform="translate(40,36)">
    <rect width="640" height="468" rx="10" fill="#ffffff"/>
    <rect width="640" height="64" rx="10" fill="#ffffff"/>
    <rect y="40" width="640" height="24" fill="#ffffff"/>

    <!-- Header -->
    <text x="24" y="40" fill="#2d2d2d" font-size="22" font-weight="600">Wallbox</text>
    <text x="24" y="58" fill="#9a9a9a" font-size="13">Garage · Veton EV Charger</text>
    <rect x="500" y="20" width="116" height="28" rx="14" fill="#69c350"/>
    <text x="558" y="39" fill="#ffffff" font-size="14" font-weight="600" text-anchor="middle">Charging</text>
    <line x1="0" y1="64" x2="640" y2="64" stroke="#ededed"/>

    <!-- Big charging icon + power -->
    <g transform="translate(24,92)">
      <circle cx="54" cy="54" r="54" fill="#f1f8ec"/>
      <path d="M54 24 l-16 34 h14 l-6 26 22 -34 h-14 z" fill="#69c350"/>
    </g>
    <text x="168" y="138" fill="#2d2d2d" font-size="46" font-weight="700">7.4<tspan font-size="22" font-weight="500" dx="6">kW</tspan></text>
    <text x="170" y="166" fill="#9a9a9a" font-size="14">Charging power · 16 A on L1</text>

    <line x1="24" y1="216" x2="616" y2="216" stroke="#ededed"/>

    <!-- Stat rows -->
    <g font-size="16">
      <text x="24" y="252" fill="#5c5c5c">Session energy</text>
      <text x="616" y="252" fill="#2d2d2d" font-weight="600" text-anchor="end">12.3 kWh</text>

      <text x="24" y="290" fill="#5c5c5c">Total energy</text>
      <text x="616" y="290" fill="#2d2d2d" font-weight="600" text-anchor="end">1,284 kWh</text>

      <text x="24" y="328" fill="#5c5c5c">Vehicle status</text>
      <text x="616" y="328" fill="#69c350" font-weight="600" text-anchor="end">Connected · Charging</text>
    </g>

    <line x1="24" y1="356" x2="616" y2="356" stroke="#ededed"/>

    <!-- Max charging current slider -->
    <text x="24" y="396" fill="#5c5c5c" font-size="16">Max charging current</text>
    <text x="616" y="396" fill="#2d2d2d" font-size="16" font-weight="600" text-anchor="end">16 A</text>
    <line x1="24" y1="420" x2="616" y2="420" stroke="#e3e3e3" stroke-width="6" stroke-linecap="round"/>
    <line x1="24" y1="420" x2="360" y2="420" stroke="#69c350" stroke-width="6" stroke-linecap="round"/>
    <circle cx="360" cy="420" r="11" fill="#ffffff" stroke="#69c350" stroke-width="3"/>
  </g>

  <text x="40" y="528" fill="#8a8d92" font-size="12">Illustrative mockup of the Loxone Wallbox visualization — not a live screenshot.</text>
</svg>
